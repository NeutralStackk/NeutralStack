services:
  - type: web
    name: neutralstack-website
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: adminneutralstack@gmail.com
      - key: CONTACT_TO
        value: adminneutralstack@gmail.com
      - key: SMTP_PASS
        sync: false
